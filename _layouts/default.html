<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | Personal Website{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Google Fonts: Inter + Lora -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600&display=swap" rel="stylesheet">

  <!-- 样式 -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">

  {% seo %}
</head>
<body>

  {% include header.html %}

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

</body>
</html>
